spring:
  datasource:
    url: jdbc:h2:mem:aiops;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      platform: h2
      encoding: UTF-8

mybatis:
  configuration:
    map-underscore-to-camel-case: true
  type-aliases-package: com.example.aiops.entity

aiops:
  llm:
    timeout-seconds: 30
  memory:
    max-history-messages: 10
  cors:
    allowed-origins: http://localhost:5173
