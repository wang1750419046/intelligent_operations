spring:
  datasource:
    url: jdbc:h2:mem:aiops;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      platform: h2
      encoding: UTF-8

mybatis:
  configuration:
    map-underscore-to-camel-case: true
  type-aliases-package: com.example.aiops.entity

aiops:
  agent:
    progress-events:
      enabled: true
  llm:
    timeout-seconds: 30
  rag:
    query-rewrite:
      enabled: false
    rerank:
      enabled: false
    remote-timeout-ms: 2000
  memory:
    max-history-messages: 10
  cors:
    allowed-origins: http://localhost:5173
  vector:
    enabled: false
    qdrant:
      host: 8.146.230.188
      port: 6334
      collection: aiops_knowledge_v1
    embedding:
      default-model: text-embedding-v3
      dimensions: 1024
      batch-size: 10
